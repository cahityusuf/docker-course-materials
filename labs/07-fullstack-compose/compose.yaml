# Docker Compose - Fullstack Lab
# Angular SPA + .NET 8 Web API + PostgreSQL + Redis + pgAdmin + RedisInsight
#
# Çalıştırma: docker compose up -d
# Durdurma:   docker compose down
# Verileri de silmek için: docker compose down -v

services:
  # ───────── Frontend ─────────

  # ───────── Backend API ─────────
  api:
    build: ./api
    container_name: fs-api
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=productsdb;Username=appuser;Password=${POSTGRES_PASSWORD:-apppass}"
      ConnectionStrings__Redis: "redis:6379"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"        # http://localhost:8080 (Swagger: /swagger)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-net]
    restart: unless-stopped

  # ───────── PostgreSQL ─────────

  postgres:
    image: postgres
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secureP@ssw0rd
    volumes:
      - local_pgdata:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container
    restart: always
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: microzon@microzon.com
      PGADMIN_DEFAULT_PASSWORD: secureP@ssw0rd
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

  # ───────── Redis ─────────
  redis:
    image: redis:7-alpine
    container_name: fs-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app-net]
    restart: unless-stopped

  # ───────── RedisInsight (Redis UI) ─────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: fs-redisinsight
    volumes:
      - redisinsightdata:/data
    ports:
      - "5540:5540"        # http://localhost:5540
    depends_on:
      redis:
        condition: service_healthy
    networks: [app-net]
    restart: unless-stopped

# ───────── Ortak ağ ─────────
networks:
  app-net:
    driver: bridge
# ───────── Kalıcı volume'ler ─────────
volumes:
  pgdata:
  redisdata:
  pgadmindata:
  redisinsightdata:
