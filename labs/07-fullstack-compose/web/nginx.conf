# Angular SPA + .NET API reverse proxy

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Performans
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json;

  # API isteklerini .NET container'ına proxy'le
  # /api/products → http://api:8080/api/products
  location /api/ {
    proxy_pass http://api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache-Control header'ını client'a ulaştır
    proxy_pass_header X-Cache;

    # Timeout
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Statik asset'lere uzun cache
  location ~* \.(?:js|css|woff2?|svg|gif|map|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Angular routing - bilinmeyen route'ları index.html'e yönlendir
  location / {
    try_files $uri $uri/ /index.html;
  }
}
